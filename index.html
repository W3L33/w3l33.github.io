<!-- ========== SHADERS (NO SE TOCAN EN JS) ========== -->

<script id="vertexShader" type="x-shader/x-vertex">
attribute vec2 a_position;
varying vec2 v_uv;

void main() {
  v_uv = vec2(a_position.x, -a_position.y) * 0.5 + 0.5;
  gl_Position = vec4(a_position, 0.0, 1.0);
}
</script>

<script id="fragmentShader" type="x-shader/x-fragment">
precision mediump float;

uniform sampler2D u_background;
uniform vec2 u_resolution;
uniform vec2 u_viewport;
uniform vec2 u_mouse;
uniform vec2 u_size;
uniform vec2 u_imageResolution;
uniform float u_dpr;
uniform float u_bgReady;
uniform float u_entranceAlpha;

varying vec2 v_uv;

/* ---------- UTIL ---------- */

float hash(vec2 p) {
  return fract(sin(dot(p, vec2(127.1,311.7))) * 43758.5453);
}

float noise(vec2 p) {
  vec2 i = floor(p);
  vec2 f = fract(p);
  f = f * f * (3.0 - 2.0 * f);

  float a = hash(i);
  float b = hash(i + vec2(1.0,0.0));
  float c = hash(i + vec2(0.0,1.0));
  float d = hash(i + vec2(1.0,1.0));

  return mix(mix(a,b,f.x), mix(c,d,f.x), f.y);
}

float roundedBox(vec2 p, vec2 b, float r) {
  vec2 d = abs(p) - b + r;
  return length(max(d, 0.0)) - r;
}

/* ---------- COVER UV ---------- */

vec2 coverUV(vec2 uv, vec2 viewport, vec2 image) {
  float viewAspect = viewport.x / viewport.y;
  float imgAspect  = image.x / image.y;

  vec2 scale = vec2(1.0);

  if (viewAspect > imgAspect) {
    scale.y = imgAspect / viewAspect;
  } else {
    scale.x = viewAspect / imgAspect;
  }

  return clamp((uv - 0.5) * scale + 0.5, 0.001, 0.999);
}

void main() {
  if (u_bgReady < 0.5) {
    gl_FragColor = vec4(0.0, 0.0, 0.0, 1.0);
    return;
  }

  vec2 pixel = (v_uv * u_resolution) / u_dpr;
  vec2 center = u_mouse;
  vec2 halfSize = u_size * 0.5;

  float dist = roundedBox(pixel - center, halfSize, 22.0);

  vec2 bgUV = coverUV(v_uv, u_viewport, u_imageResolution);
  vec3 base = texture2D(u_background, bgUV).rgb;

  if (dist > 2.0) {
    gl_FragColor = vec4(base, 1.0);
    return;
  }

  float mask = smoothstep(2.0, -4.0, dist);

  vec2 localUV = (pixel - center) / u_size;
  vec2 n;
  n.x = noise(localUV * 12.0);
  n.y = noise(localUV * 12.0 + 10.0);
  n = (n - 0.5) * 2.0;

  float edgeBoost = smoothstep(0.0, 0.7, length(localUV));
  vec2 offset = n * 0.015 * mix(0.7, 1.2, edgeBoost) * mask;

  vec3 refracted = texture2D(u_background, bgUV + offset).rgb;

  vec3 glass = mix(base, refracted, 0.9);
  glass = mix(glass, vec3(0.92), mask * 0.25);

  vec3 glassShown = mix(base, glass, u_entranceAlpha);
  float outAlpha = mix(1.0, 0.88, mask * u_entranceAlpha);
  gl_FragColor = vec4(glassShown, outAlpha);
}
</script>

<script id="modalGlassFragmentShader" type="x-shader/x-fragment">
precision mediump float;

uniform sampler2D u_background;
uniform vec2 u_resolution;
uniform vec2 u_viewport;
uniform vec4 u_rect;
uniform vec2 u_imageResolution;
uniform float u_dpr;

varying vec2 v_uv;

float hash(vec2 p) {
  return fract(sin(dot(p, vec2(127.1,311.7))) * 43758.5453);
}

float noise(vec2 p) {
  vec2 i = floor(p);
  vec2 f = fract(p);
  f = f * f * (3.0 - 2.0 * f);

  float a = hash(i);
  float b = hash(i + vec2(1.0,0.0));
  float c = hash(i + vec2(0.0,1.0));
  float d = hash(i + vec2(1.0,1.0));

  return mix(mix(a,b,f.x), mix(c,d,f.x), f.y);
}

float roundedBox(vec2 p, vec2 b, float r) {
  vec2 d = abs(p) - b + r;
  return length(max(d, 0.0)) - r;
}

vec2 coverUV(vec2 uv, vec2 viewport, vec2 image) {
  float viewAspect = viewport.x / viewport.y;
  float imgAspect  = image.x / image.y;

  vec2 scale = vec2(1.0);

  if (viewAspect > imgAspect) {
    scale.y = imgAspect / viewAspect;
  } else {
    scale.x = viewAspect / imgAspect;
  }

  return clamp((uv - 0.5) * scale + 0.5, 0.001, 0.999);
}

void main() {
  vec2 client = vec2(
    u_rect.x + v_uv.x * u_rect.z,
    u_rect.y + (1.0 - v_uv.y) * u_rect.w
  );
  vec2 pixel = vec2(client.x, u_viewport.y - client.y);
  vec2 centerClient = u_rect.xy + u_rect.zw * 0.5;
  vec2 center = vec2(centerClient.x, u_viewport.y - centerClient.y);
  vec2 halfSize = 0.5 * u_rect.zw;

  float dist = roundedBox(pixel - center, halfSize, 18.0);

  vec2 v_uv_global = vec2(client.x / u_viewport.x, 1.0 - client.y / u_viewport.y);
  vec2 bgUV = coverUV(v_uv_global, u_viewport, u_imageResolution);
  vec3 base = texture2D(u_background, bgUV).rgb;

  if (dist > 2.0) {
    gl_FragColor = vec4(0.0, 0.0, 0.0, 0.0);
    return;
  }

  float mask = smoothstep(2.0, -4.0, dist);

  vec2 localUV = (pixel - center) / u_rect.zw;
  vec2 n;
  n.x = noise(localUV * 12.0);
  n.y = noise(localUV * 12.0 + 10.0);
  n = (n - 0.5) * 2.0;

  float edgeBoost = smoothstep(0.0, 0.7, length(localUV));
  vec2 offset = n * 0.015 * mix(0.7, 1.2, edgeBoost) * mask;

  vec3 refracted = texture2D(u_background, bgUV + offset).rgb;

  vec3 glass = mix(base, refracted, 0.9);
  glass = mix(glass, vec3(0.92), mask * 0.25);

  gl_FragColor = vec4(glass, 0.88);
}
</script>
